<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中餐對帳監督系統</title>
    <style>
        :root { --primary: #4a90e2; --income: #2ecc71; --expense: #e74c3c; --bg: #fdfaf3; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .balance-board { background: #333; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: bold; color: #f1c40f; }
        .init-section { background: #fff9db; padding: 12px; border: 1px solid #f1c40f; border-radius: 10px; margin-bottom: 15px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
        .init-section input { width: 110px; padding: 8px; border-radius: 6px; border: none; text-align: right; font-size: 16px; font-weight: bold; background: #eee; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f9f2ff; padding: 10px; border-radius: 10px; }
        .full-width { grid-column: span 2; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 5px; }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-income { background: var(--income); }
        .btn-expense { background: var(--expense); }
        .btn-clear { background: #ff4d4d; font-size: 12px; padding: 6px 12px; border-radius: 6px; }
        .sync-status { text-align: center; font-size: 10px; color: #999; margin-bottom: 10px; }
        .history { height: 350px; overflow-y: auto; border-top: 1px solid #eee; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        /* 刪除小按鈕樣式 */
        .del-btn { background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; line-height: 22px; text-align: center; margin-left: 10px; font-weight: bold; padding: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-status" id="syncStatus">☁️ 雲端同步中...</div>
    <div class="balance-board">
        <div style="font-size:14px; opacity:0.8;">錢包理論餘額</div>
        <div class="balance-amount" id="currentBalance">$ 0</div>
    </div>

    <div class="init-section">
        <strong>💰 雲端起始金額：</strong>
        <div>
            <input type="number" id="startBalance" readonly>
            <span style="font-weight:bold;"> 元</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="itemName" class="full-width" placeholder="品項名稱">
        <input type="number" id="itemPrice" class="full-width" placeholder="金額" inputmode="decimal">
        <button class="btn-income" onclick="handleAdd('收入')">＋ 收入</button>
        <button class="btn-expense" onclick="handleAdd('支出')">－ 支出</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size:14px; color:#555;">📊 最近紀錄 (點✕刪除)</strong>
        <div>
            <button class="btn-clear" onclick="clearCloudData()">🗑️ 結算</button>
            <button onclick="fetchCloudData()" style="background:none; color:var(--primary); font-size:12px; width:auto; padding:0; text-decoration:underline; margin-left:8px;">🔄 重整</button>
        </div>
    </div>
    <div id="historyList" class="history"></div>
</div>

<script>
    const G_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc4Ew-yB2AV9i3cKa4hK-bUD6cnfq2zazomkq7ZRzIA1R7Urw/viewform";
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbxCyVANenPJM04e60V8lCHrI1hPFeGgGE9uDLIo26vdyw7ddf3OUZMdTz6iNYWAKm5ZvQ/exec"; 

    let cloudRecords = [];

    async function fetchCloudData() {
        document.getElementById('syncStatus').innerText = "☁️ 正在連線...";
        try {
            const response = await fetch(CLOUD_API_URL);
            const json = await response.json();
            document.getElementById('startBalance').value = json.startBalance || 0;
            cloudRecords = json.records;
            refreshUI();
            document.getElementById('syncStatus').innerText = "✅ 已同步最新資料";
        } catch (e) { document.getElementById('syncStatus').innerText = "❌ 連線失敗"; }
    }

    function handleAdd(type) {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        if (!name || !price) { alert("內容填完再按啦！"); return; }
        const formData = new URLSearchParams();
        formData.append("entry.980568124", name);             
        formData.append("entry.302822055", type);
        formData.append("entry.572237538", price);
        fetch(G_FORM_URL, { method: "POST", mode: "no-cors", body: formData }).then(() => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            setTimeout(fetchCloudData, 1500);
        });
    }

    // 刪除特定一筆的功能
    async function deleteThisRecord(rowId) {
        if (confirm("確定要刪除這筆紀錄嗎？")) {
            document.getElementById('syncStatus').innerText = "🧹 正在移除...";
            try {
                // 發送 POST 請求並帶上 row 參數
                await fetch(CLOUD_API_URL + "?row=" + rowId, { method: "POST", mode: "no-cors" });
                setTimeout(fetchCloudData, 1500);
            } catch (e) { alert("刪除失敗"); }
        }
    }

    async function clearCloudData() {
        if (confirm("要結算本週嗎？這會把餘額轉入起始金額並清空明細喔！")) {
            document.getElementById('syncStatus').innerText = "🧹 結算中...";
            try {
                await fetch(CLOUD_API_URL, { method: "POST", mode: "no-cors" });
                location.reload(); 
            } catch (e) { alert("結算失敗"); }
        }
    }

    function refreshUI() {
        const startAmount = parseFloat(document.getElementById('startBalance').value) || 0;
        const listDiv = document.getElementById('historyList');
        
        // 渲染畫面
        listDiv.innerHTML = cloudRecords.slice().reverse().map(r => {
            const p = parseFloat(r.price) || 0;
            return `
                <div class="item">
                    <div style="flex:1;">
                        <b>${r.name}</b><br><small>${r.time}</small>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <b style="color:${r.type==='收入'?'var(--income)':'var(--expense)'};">
                            ${r.type==='收入'?'+':'-'}$${p.toLocaleString()}
                        </b>
                        <button class="del-btn" onclick="deleteThisRecord(${r.id})">✕</button>
                    </div>
                </div>`;
        }).join('');

        let finalBalance = startAmount;
        cloudRecords.forEach(r => {
            const p = parseFloat(r.price) || 0;
            if (r.type === '收入') finalBalance += p; else finalBalance -= p;
        });
        document.getElementById('currentBalance').innerText = `$ ${finalBalance.toLocaleString()}`;
    }

    fetchCloudData();
</script>
</body>
</html>
